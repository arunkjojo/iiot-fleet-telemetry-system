name: Docker Image CI

on:
  push:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - service: db
            context: ./db
            dockerfile: ./db/Dockerfile
          - service: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - service: iiot-emitter
            context: ./iiot-emitter
            dockerfile: ./iiot-emitter/Dockerfile

    steps:
    - uses: actions/checkout@v4
    - name: Build the ${{ matrix.service }} image
      run: docker build "${{ matrix.context }}" --file "${{ matrix.dockerfile }}" --tag "iiot-fleet-${{ matrix.service }}:$(date +%s)"
