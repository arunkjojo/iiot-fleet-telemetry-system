services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=fleet_telemetry
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Admin123.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - iiot-fleet-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      # context is the actual source dir (repo-root ../backend); dockerfile
      # points back into this containers/ dir where the Dockerfile now lives.
      # Compose resolves both relative to this file's own directory.
      context: ../backend
      dockerfile: ../containers/backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - FRONTEND_ORIGIN=http://frontend:3000
      - ADDITIONAL_FRONTEND_ORIGINS=http://localhost:3000
      - ConnectionStrings__Fleet=Host=db;Port=5432;Database=fleet_telemetry;Username=postgres;Password=Admin123.
    depends_on:
      db:
        condition: service_healthy
    networks:
      - iiot-fleet-net
    restart: unless-stopped
    healthcheck:
      # mcr.microsoft.com/dotnet/aspnet:8.0 has neither curl nor wget; use bash's
      # built-in /dev/tcp to confirm Kestrel is accepting connections on 8080.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8080'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ../frontend
      dockerfile: ../containers/frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
    depends_on:
      - backend
    networks:
      - iiot-fleet-net
    restart: unless-stopped
    healthcheck:
      # node:18-alpine (busybox) has wget but no curl.
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  emitter:
    build:
      context: ../emitter
      dockerfile: ../containers/emitter/Dockerfile
    environment:
      - BACKEND_URL=http://backend:8080
      - VEHICLE_COUNT=10000
      - TICK_INTERVAL_SECONDS=3
      - MAX_CONCURRENCY=300
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - iiot-fleet-net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  iiot-fleet-net:
    driver: bridge
