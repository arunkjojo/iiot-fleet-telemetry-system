# =============================================================================
# postgresql.conf — IIoT Fleet Telemetry (tuned for db/Dockerfile)
# =============================================================================
# Base: PostgreSQL 16 default configuration.
# Only the settings below are intentionally overridden from stock defaults to
# support sustained, write-heavy batched inserts from the backend's buffered
# TelemetryPersistenceService (up to ~2,000-row batches, ~1x/second) while a
# large number of short-lived connections may be opened by the API tier.
#
# Schema ownership is NOT affected by this file — EF Core migrations remain
# the only schema authority. This file only tunes the server process.
# =============================================================================

# -----------------------------------------------------------------------------
# CONNECTIONS
# -----------------------------------------------------------------------------
# Stock postgresql.conf defaults to 'localhost' — since this file fully
# replaces the container's default conf, sibling containers (backend) on the
# iiot-fleet-net Docker network could not reach this instance without an
# explicit override.
listen_addresses = '*'

# Default is 100. Raised to give headroom for the ASP.NET Core connection pool
# plus ad-hoc `psql`/tooling connections without exhausting the backend.
max_connections = 200

# -----------------------------------------------------------------------------
# MEMORY
# -----------------------------------------------------------------------------
# Default is 128MB. Raised for a dedicated telemetry-ingestion DB container;
# rule of thumb is ~25% of container memory for a host with >=1GB available.
shared_buffers = 256MB

# Default is 4MB. Modestly raised to help sort/hash operations used by
# dashboard read queries against telemetry_snapshots/vehicle_logs.
work_mem = 8MB

# Default is 64MB. Raised to speed up index builds/VACUUM on growing
# telemetry tables without over-committing memory.
maintenance_work_mem = 128MB

# Default is 4GB. Reasonable planner hint for a small-to-mid container host;
# helps the planner favor index usage over sequential scans where appropriate.
effective_cache_size = 768MB

# -----------------------------------------------------------------------------
# CHECKPOINTING / WAL
# -----------------------------------------------------------------------------
# Default is 0.5. Raised to spread checkpoint I/O more evenly across the
# checkpoint interval, smoothing write latency spikes under a sustained
# insert-heavy workload (batched telemetry writes every ~1s).
checkpoint_completion_target = 0.9

# Default is 1GB. Raised alongside checkpoint_completion_target so checkpoints
# fire less frequently under sustained write throughput.
max_wal_size = 2GB
min_wal_size = 512MB

# -----------------------------------------------------------------------------
# LOGGING (left at conservative defaults; uncomment for local debugging)
# -----------------------------------------------------------------------------
# log_min_duration_statement = 500
