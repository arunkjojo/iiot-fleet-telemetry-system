# Non-secret env vars shared across backend/frontend, editable without
# touching template files — the k8s-native equivalent of docker-compose.yml's
# per-service `environment:` blocks (minus anything password-shaped).
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "iiot-fleet-app.fullname" . }}-config
  labels:
    {{- include "iiot-fleet-app.labels" . | nindent 4 }}
data:
  ASPNETCORE_ENVIRONMENT: {{ .Values.backend.aspnetEnvironment | quote }}
  FRONTEND_ORIGIN: "http://{{ include "iiot-fleet-app.fullname" . }}-frontend:{{ .Values.frontend.service.port }}"
  ADDITIONAL_FRONTEND_ORIGINS: {{ .Values.backend.additionalFrontendOrigins | quote }}
  USE_LIVE_TELEMETRY: {{ .Values.backend.useLiveTelemetry | quote }}
  NEXT_PUBLIC_API_URL: "http://{{ include "iiot-fleet-app.fullname" . }}-backend:{{ .Values.backend.service.port }}"
