apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iiot-fleet-app.fullname" . }}-backend
  labels:
    {{- include "iiot-fleet-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "iiot-fleet-app.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "iiot-fleet-app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.service.port }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "iiot-fleet-app.fullname" . }}-config
          env:
            - name: ConnectionStrings__Fleet
              valueFrom:
                secretKeyRef:
                  name: {{ include "iiot-fleet-app.fullname" . }}-backend
                  key: ConnectionStrings__Fleet
          # mcr.microsoft.com/dotnet/aspnet:8.0 has neither curl nor wget, so an
          # httpGet probe isn't available; tcpSocket matches what
          # docker-compose.yml's healthcheck actually verifies (Kestrel
          # accepting connections), not full app readiness.
          readinessProbe:
            tcpSocket:
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
