# templates/backend/deployment.yaml
#
# Why Deployment (not StatefulSet): the backend is stateless — any pod can
# serve any request, none needs a stable identity or its own storage. A
# rolling update just replaces pods one at a time; nothing is lost.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iiot-fleet-app.fullname" . }}-backend
  labels:
    {{- include "iiot-fleet-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  # Configurable — this workload is horizontally scalable, unlike db/emitter.
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "iiot-fleet-app.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "iiot-fleet-app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.service.port }}
              name: http
          envFrom:
            # Non-secret config (ASPNETCORE_ENVIRONMENT, CORS origins,
            # USE_LIVE_TELEMETRY, ...) — shared with frontend where relevant,
            # see templates/app-configmap.yaml.
            - configMapRef:
                name: {{ include "iiot-fleet-app.fullname" . }}-config
          env:
            # The one thing the backend needs that's actually secret: the
            # Postgres connection string (embeds the db password). Sourced
            # from backend/secret.yaml, never the ConfigMap.
            - name: ConnectionStrings__Fleet
              valueFrom:
                secretKeyRef:
                  name: {{ include "iiot-fleet-app.fullname" . }}-backend
                  key: ConnectionStrings__Fleet
          # mcr.microsoft.com/dotnet/aspnet:8.0 has neither curl nor wget, so
          # an httpGet probe isn't available; tcpSocket matches what
          # docker-compose.yml's healthcheck actually verifies (Kestrel
          # accepting connections), not full app readiness.
          readinessProbe:
            tcpSocket:
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            # requests/limits from values.yaml — keeps CPU/memory tuning out
            # of the template, so an operator overrides it without touching
            # YAML structure.
            {{- toYaml .Values.backend.resources | nindent 12 }}
