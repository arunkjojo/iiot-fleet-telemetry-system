# templates/backend/secret.yaml
#
# Holds the assembled Npgsql connection string. Kept out of app-configmap.yaml
# because it embeds the db password; the password component is the same
# value db/secret.yaml's POSTGRES_PASSWORD is built from (.Values.db.password)
# so both Secrets stay in sync without one referencing the other at render
# time — Helm has no cross-Secret reference mechanism, so both simply read
# the same source value.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "iiot-fleet-app.fullname" . }}-backend
  labels:
    {{- include "iiot-fleet-app.labels" . | nindent 4 }}
type: Opaque
data:
  # Host is "<fullname>-db" — matches templates/db/service.yaml's headless
  # Service name exactly, so this resolves inside the cluster without any
  # extra DNS config.
  ConnectionStrings__Fleet: {{ printf "Host=%s-db;Port=%v;Database=fleet_telemetry;Username=postgres;Password=%s;" (include "iiot-fleet-app.fullname" .) .Values.db.port .Values.db.password | b64enc }}
