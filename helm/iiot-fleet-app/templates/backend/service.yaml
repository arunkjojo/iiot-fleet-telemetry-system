# templates/backend/service.yaml
#
# ClusterIP (the default type) — internal-only. Reached by the frontend and
# emitter inside the cluster; external access (if enabled) goes through
# templates/ingress.yaml instead, not through this Service directly.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "iiot-fleet-app.fullname" . }}-backend
  labels:
    {{- include "iiot-fleet-app.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "iiot-fleet-app.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
