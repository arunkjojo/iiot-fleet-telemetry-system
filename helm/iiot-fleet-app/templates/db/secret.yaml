# templates/db/secret.yaml
#
# Holds POSTGRES_PASSWORD out of band from the StatefulSet spec so it never
# appears in `kubectl get statefulset -o yaml`. .Values.db.password is a
# placeholder default in values.yaml — always override it at install time
# (`--set db.password=<real-password>`), never commit a real one here.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "iiot-fleet-app.fullname" . }}-db
  labels:
    {{- include "iiot-fleet-app.labels" . | nindent 4 }}
type: Opaque
data:
  # b64enc: Kubernetes Secret `data` values must be base64-encoded.
  POSTGRES_PASSWORD: {{ .Values.db.password | b64enc | quote }}
