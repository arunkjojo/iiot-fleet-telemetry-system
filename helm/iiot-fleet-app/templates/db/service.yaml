apiVersion: v1
kind: Service
metadata:
  name: {{ include "iiot-fleet-app.fullname" . }}-db
  labels:
    {{- include "iiot-fleet-app.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.db.port }}
      targetPort: {{ .Values.db.port }}
      protocol: TCP
      name: postgres
  selector:
    {{- include "iiot-fleet-app.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: db
