# templates/db/statefulset.yaml
#
# Why a StatefulSet and not a Deployment: Postgres needs a stable identity and
# storage that follows it across pod rescheduling. A Deployment's pods are
# interchangeable and their storage isn't guaranteed to reattach to the "same"
# pod — fine for the stateless backend/frontend, wrong for a database.
#
# Why postgres:16-alpine directly (no custom Dockerfile): this used to build a
# tuned image from db/Dockerfile + db/postgresql.conf; that layer was removed
# so the chart has one fewer image to build/maintain. Server tuning, if
# needed again later, can come back as a ConfigMap mounted over
# /etc/postgresql/postgresql.conf without reintroducing a custom image.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "iiot-fleet-app.fullname" . }}-db
  labels:
    # Shared chart/release labels (see _helpers.tpl) so `kubectl get all -l
    # app.kubernetes.io/instance=<release>` finds this alongside every other
    # resource the chart renders.
    {{- include "iiot-fleet-app.labels" . | nindent 4 }}
    # Component label distinguishes "the db part of this release" from
    # backend/frontend/emitter, used below in matchLabels/selector.
    app.kubernetes.io/component: db
spec:
  # Must match metadata.name — the StatefulSet's governing Service, giving
  # each pod a stable DNS name (<pod>.<serviceName>).
  serviceName: {{ include "iiot-fleet-app.fullname" . }}-db
  # Single instance: this chart doesn't attempt Postgres replication/HA.
  replicas: 1
  selector:
    matchLabels:
      {{- include "iiot-fleet-app.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: db
  template:
    metadata:
      labels:
        {{- include "iiot-fleet-app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: db
    spec:
      containers:
        - name: db
          # Stock public image + tag, both overridable via values.yaml —
          # no build step, no private registry.
          image: "{{ .Values.db.image.repository }}:{{ .Values.db.image.tag }}"
          imagePullPolicy: {{ .Values.db.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.db.port }}
              name: postgres
          env:
            # First-run database name — the official postgres image's
            # entrypoint creates this database (and the matching role below)
            # on an empty data directory only.
            - name: POSTGRES_DB
              value: "fleet_telemetry"
            - name: POSTGRES_USER
              value: "postgres"
            # Never a plaintext value here — sourced from db/secret.yaml so
            # the password never appears in `helm get values` or `kubectl get
            # statefulset -o yaml` output.
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "iiot-fleet-app.fullname" . }}-db
                  key: POSTGRES_PASSWORD
          volumeMounts:
            # Mounts the volumeClaimTemplates PVC below at Postgres's actual
            # data directory, so writes survive pod restarts/rescheduling.
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            # pg_isready is the officially-recommended readiness check;
            # ships in every postgres image, no extra tooling needed.
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
  volumeClaimTemplates:
    # volumeClaimTemplates (not a standalone PVC) is the StatefulSet-specific
    # mechanism: each replica gets its own PVC, bound for that replica's
    # lifetime — the k8s-native equivalent of docker-compose.yml's
    # `postgres_data` named volume.
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.db.storage.size }}
