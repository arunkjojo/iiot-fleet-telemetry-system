# Why postgres:16-alpine directly (no custom Dockerfile): this used to build a tuned image from db/Dockerfile + db/postgresql.conf; that layer was removed so the chart has one fewer image to build/maintain. Server tuning, if needed again later, can come back as a ConfigMap mounted over /etc/postgresql/postgresql.conf without reintroducing a custom image.
apiVersion: apps/v1 # Kubernetes which API group/version defines this object's schema.
kind: StatefulSet # Why a StatefulSet and not a Deployment: Postgres needs a stable identity and storage that follows it across pod rescheduling. A Deployment's pods are interchangeable and their storage isn't guaranteed to reattach to the "same" pod — fine for the stateless backend/frontend, wrong for a database.
metadata:
  name: {{ include "iiot-fleet-app.fullname" . }}-db
  labels:
    {{- include "iiot-fleet-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: db
spec:
  serviceName: {{ include "iiot-fleet-app.fullname" . }}-db
  replicas: 1 # Single instance: this chart doesn't attempt Postgres replication/HA.
  selector:
    matchLabels:
      {{- include "iiot-fleet-app.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: db
  template:
    metadata:
      labels:
        {{- include "iiot-fleet-app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: db
    spec:
      containers:
        - name: db
          image: "{{ .Values.db.image.repository }}:{{ .Values.db.image.tag }}"
          imagePullPolicy: {{ .Values.db.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.db.port }}
              name: postgres
          env:
            - name: POSTGRES_DB
              value: "fleet_telemetry"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "iiot-fleet-app.fullname" . }}-db
                  key: POSTGRES_PASSWORD
          volumeMounts: # attaches a volume inside the container's filesystem
            - name: postgres-data # match the name of a volume made available to the Pod — here, that volume comes from the volumeClaimTemplates
              mountPath: /var/lib/postgresql/data # actual directory the official Postgres image writes its data files to. Mounting persistent storage exactly here
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"] # is a small utility bundled with every official Postgres image specifically for this purpose
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
  volumeClaimTemplates: # It is the StatefulSet-specific mechanism: each replica gets its own PVC, bound for that replica's lifetime — the k8s-native equivalent of docker-compose.yml's `postgres_data` named volume.
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"] # volume can be mounted read-write by a single node at a time.
        resources:
          requests:
            storage: {{ .Values.db.storage.size }}
