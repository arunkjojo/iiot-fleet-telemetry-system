apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iiot-fleet-app.fullname" . }}-emitter
  labels:
    {{- include "iiot-fleet-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: emitter
spec:
  replicas: {{ .Values.emitter.replicaCount }}
  selector:
    matchLabels:
      {{- include "iiot-fleet-app.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: emitter
  template:
    metadata:
      labels:
        {{- include "iiot-fleet-app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: emitter
    spec:
      initContainers: # distinct list from containers:. Kubernetes runs every entry in initContainers sequentially, to completion, before starting any of the Pod's regular containers. 
        - name: wait-for-backend
          image: busybox:1.36 # a tiny, minimal Linux image commonly used for init/utility containers precisely because it bundles small standard tools without the overhead of a full application image.
          command:
            - sh
            - -c
            - |
              until wget -q -T 2 -O /dev/null "http://{{ include "iiot-fleet-app.fullname" . }}-backend:{{ .Values.backend.service.port }}/api/vehicles/metadata"; do
                echo "waiting for backend..."
                sleep 2
              done
      containers:
        - name: emitter
          image: "{{ .Values.emitter.image.repository }}:{{ .Values.emitter.image.tag }}"
          imagePullPolicy: {{ .Values.emitter.image.pullPolicy }}
          env:
            - name: BACKEND_URL
              value: "http://{{ include "iiot-fleet-app.fullname" . }}-backend:{{ .Values.backend.service.port }}"
            - name: VEHICLE_COUNT
              value: {{ .Values.emitter.vehicleCount | quote }}
            - name: TICK_INTERVAL_SECONDS
              value: {{ .Values.emitter.tickIntervalSeconds | quote }}
            - name: MAX_CONCURRENCY
              value: {{ .Values.emitter.maxConcurrency | quote }}
          resources:
            {{- toYaml .Values.emitter.resources | nindent 12 }}
