# templates/frontend/deployment.yaml
#
# Stateless Next.js app — plain Deployment, same reasoning as backend. No
# frontend/secret.yaml exists: every env var this service needs
# (NEXT_PUBLIC_API_URL) is non-secret and lives in app-configmap.yaml.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iiot-fleet-app.fullname" . }}-frontend
  labels:
    {{- include "iiot-fleet-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "iiot-fleet-app.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "iiot-fleet-app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.service.port }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "iiot-fleet-app.fullname" . }}-config
          # The kubelet probes over HTTP natively — no in-container binary
          # (curl/wget) needed either way, unlike the backend's tcpSocket
          # workaround.
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
