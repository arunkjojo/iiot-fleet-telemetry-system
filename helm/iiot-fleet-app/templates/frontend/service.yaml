# templates/frontend/service.yaml
#
# Stable internal address the Ingress (when enabled) routes `/` to; also
# usable directly via `kubectl port-forward` when Ingress is off.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "iiot-fleet-app.fullname" . }}-frontend
  labels:
    {{- include "iiot-fleet-app.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: {{ .Values.frontend.service.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "iiot-fleet-app.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
